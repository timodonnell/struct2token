# Training-only config (for overriding defaults)

training:
  lr: 3.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 1000
  max_steps: 500000
  batch_size: 2
  grad_clip: 1.0
  ema_decay: 0.999
  val_every: 5000
  save_every: 10000
  log_every: 100
  checkpoint_dir: "checkpoints"
  wandb_project: "struct2token"
  seed: 42
