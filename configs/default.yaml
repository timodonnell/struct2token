# struct2token master configuration

model:
  encoder:
    d_model: 256
    n_layers: 4
    n_heads: 8
    mlp_ratio: 4.0
    dropout: 0.0
  fsq:
    levels: [8, 5, 5, 5]
  decoder:
    d_model: 512
    n_layers: 12
    n_heads: 8
    mlp_ratio: 4.0
    dropout: 0.0
  max_seq_len: 8192
  n_tokens: 128
  cfg_drop_rate: 0.05
  size_loss_weight: 0.01

data:
  mmcif_dir: "~/tim1/helico-data/raw/mmCIF"
  index_path: "data/index.parquet"
  cache_dir: "data/cache"
  max_atoms: 8000
  min_atoms: 10
  val_fraction: 0.05
  num_workers: 4

training:
  lr: 3.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  warmup_steps: 1000
  max_steps: 500000
  batch_size: 2
  grad_clip: 1.0
  ema_decay: 0.999
  val_every: 5000
  save_every: 10000
  log_every: 100
  checkpoint_dir: "checkpoints"
  wandb_project: "struct2token"
  seed: 42

inference:
  n_steps: 100
  cfg_weight: 2.0
  noise_weight: 0.45
